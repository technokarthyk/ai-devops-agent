name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Install dependencies
        run: npm install
      - name: Build and test
        run: npm run build && npm run test
      - name: Deploy to production
        uses: actions/deploy@v1
        with:
          provider: azure-webapps
          app-name: my-app
          resource-group: my-resource-group
          plan: my-plan
          slot: production
          username: ${{ secrets.AZURE_WEBAPPS_USERNAME }}
          password: ${{ secrets.AZURE_WEBAPPS_PASSWORD }}