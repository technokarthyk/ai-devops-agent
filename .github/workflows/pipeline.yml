name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Run tests
        run: |
          echo "This is a simple test"
      - name: Deploy
        uses: actions/deploy@v2
        with:
          provider: github
          ref: main