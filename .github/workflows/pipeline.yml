name: My Workflow

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          pip install pylint

      - name: Run pylint
        run: |
          pylint . --rcfile=.pylintrc

      - name: Test
        run: |
          python -m unittest discover -p *_test.py

      - name: Deploy
        uses: actions/deploy@v1
        with:
          provider: GitHub
          ref: ${{ github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: main