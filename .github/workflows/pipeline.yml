name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Deploy to production
        uses: actions/deploy@v1
        with:
          provider: github
          ref: main
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}