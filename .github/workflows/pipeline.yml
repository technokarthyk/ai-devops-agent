name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build and test
        run: |
          npm install
          npm run build
          npm run test

      - name: Deploy to production
        uses: actions/deploy@v1
        with:
          provider: github
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          branch: main